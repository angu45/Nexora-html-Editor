        // --- MONACO INITIALIZATION ---
        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('monaco-host'), {
                value: vfs[activeFile].content,
                language: 'html',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 14,
                fontFamily: 'JetBrains Mono',
                minimap: { enabled: true },
                padding: { top: 20 },
                cursorSmoothCaretAnimation: "on",
                smoothScrolling: true,
                scrollbar: { verticalScrollbarSize: 5 }
            });

            // Logic: Content Change Update VFS
            editor.onDidChangeModelContent(() => {
                vfs[activeFile].content = editor.getValue();
                if(document.getElementById('auto-save-toggle').checked) localStorage.setItem('nexora_data', JSON.stringify(vfs));
            });

            editor.onDidChangeCursorPosition(e => {
                document.getElementById('stat-cursor').innerText = `Ln ${e.position.lineNumber}, Col ${e.position.column}`;
            });

            renderTabs();
        });

        // --- UI & TAB ENGINE ---
        function renderTabs() {
            const bar = document.getElementById('vfs-tabs');
            bar.innerHTML = '';
            Object.keys(vfs).forEach(name => {
                const tab = document.createElement('div');
                tab.className = `tab ${name === activeFile ? 'active' : ''}`;
                tab.innerHTML = `
                    <span onclick="switchFile('${name}')">📄 ${name}</span>
                    <span class="tab-options" onclick="showFileMenu(event, '${name}')">▼</span>
                `;
                bar.appendChild(tab);
            });
            document.getElementById('stat-file').innerText = `File: ${activeFile}`;
        }

        function switchFile(name) {
            activeFile = name;
            const model = monaco.editor.createModel(vfs[name].content, vfs[name].lang);
            editor.setModel(model);
            renderTabs();
        }

        function showFileMenu(e, name) {
            e.stopPropagation();
            targetFile = name;
            const menu = document.getElementById('file-menu');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = (e.pageY + 10) + 'px';
            document.addEventListener('click', () => menu.style.display = 'none', {once: true});
        }

        // --- ACTION HANDLERS ---
        function addNewFile() {
            const n = prompt("Filename (e.g. login.html):");
            if(n) {
                const ext = n.split('.').pop();
                const m = { html:'html', css:'css', js:'javascript' };
                vfs[n] = { lang: m[ext] || 'plaintext', content: '' };
                switchFile(n);
            }
        }

        function saveProject() {
            localStorage.setItem('nexora_data', JSON.stringify(vfs));
            const btn = document.querySelector('button[onclick="saveProject()"]');
            btn.innerHTML = "✅ SAVED";
            setTimeout(() => btn.innerHTML = "<span>💾 Save</span>", 1500);
        }

        async function bundleDownload() {
            const zip = new JSZip();
            Object.keys(vfs).forEach(fn => zip.file(fn, vfs[fn].content));
            const content = await zip.generateAsync({type:"blob"});
            saveAs(content, "nexora_export.zip");
        }

        function beautifyCode() {
            editor.getAction('editor.action.formatDocument').run();
        }

        // --- PREVIEW ENGINE (TITAN VERSION) ---
        function launchPreview() {
            const box = document.getElementById('preview-box');
            const frame = document.getElementById('preview-frame');
            
            let html = vfs['index.html'] ? vfs['index.html'].content : '<h1>index.html missing</h1>';
            let css = `<style>${Object.values(vfs).filter(f => f.lang === 'css').map(f => f.content).join('\n')}</style>`;
            let js = `<script>${Object.values(vfs).filter(f => f.lang === 'javascript').map(f => f.content).join('\n')}<\/script>`;

            let bundled = html.replace('</head>', `${css}</head>`).replace('</body>', `${js}</body>`);
            const blob = new Blob([bundled], { type: 'text/html' });
            frame.src = URL.createObjectURL(blob);
            box.style.display = 'flex';
        }

        function closePreview() { document.getElementById('preview-box').style.display = 'none'; }

        function setPreviewDevice(mode) {
            const f = document.getElementById('preview-frame');
            f.className = mode === 'mobile' ? 'stage-mobile' : 'stage-desktop';
        }

        // --- SETTINGS CONTROLLER ---
        function toggleSettings() {
            document.getElementById('settings-gui').classList.toggle('active');
        }

        function changeSystemTheme(val) { document.body.className = val; }

        function applyEditorSettings() {
            const size = document.getElementById('font-range').value;
            const wrap = document.getElementById('wrap-pick').value;
            document.getElementById('font-display').innerText = size;
            editor.updateOptions({
                fontSize: parseInt(size),
                wordWrap: wrap
            });
        }

        function deleteTargetFile() {
            if(confirm(`Delete ${targetFile}?`)) {
                delete vfs[targetFile];
                switchFile(Object.keys(vfs)[0]);
            }
        }

        // Dynamic Resize Logic
        if(window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.body.style.height = window.visualViewport.height + 'px';
                if(editor) editor.layout();
            });
        }
    </script>
</body>
</html>
